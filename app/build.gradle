plugins {
    // Apply the scala Plugin to add support for Scala.
    id 'scala'

    // Apply the application plugin to add support for building a CLI application in Java.
    id 'application'
}

repositories {
    // Use Maven Central for resolving dependencies.
    mavenCentral()
}

dependencies {
    implementation libs.scala.library
}

tasks.withType(ScalaCompile) {
    configure(scalaCompileOptions.forkOptions) {
        jvmArgs = ['-Xss4m', '-Xmx2048m']
    }
    scalaCompileOptions.additionalParameters = ['-no-indent']
}

// Apply a specific Java toolchain to ease working on different environments.
java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(8)
    }
}


application {
    mainClass = 'com.malykh.drb3.Main'
}

jar {
  archiveBaseName = 'malykh-drb3-reader'
  manifest {
    attributes 'Main-Class': 'com.malykh.drb3.Main'
    attributes 'Class-Path': configurations.runtimeClasspath.collect { it.name }.join(' ')
  }
}

task distr(type: Copy) {
  from configurations.runtimeClasspath
  from jar
  into layout.projectDirectory.dir('..').dir('distr').dir('lib')
}
